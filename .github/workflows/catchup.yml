name: Catch-up Run

on:
  workflow_dispatch:

jobs:
  # ── Step 1: Daily queue for ALL pairs (run immediately) ───────────────────────
  daily-queue-all:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Daily queue — all pairs
        run: python queue_generator.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

  # ── Step 2: Monthly external reports → Pylon (today = 1st of month) ──────────
  monthly-external-all:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: daily-queue-all
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -r requirements.txt
      - run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0
      - name: Monthly external — all pairs → Pylon
        run: python report_generator.py --monthly --external-only
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYLON_KEY: ${{ secrets.PYLON_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
