name: Stamina Sync

on:
  schedule:
    - cron: '0 */3 * * *'  # every 3 hours, 24/7
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install weasyprint system dependencies
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      - name: Run sync
        run: python sync.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYLON_KEY:    ${{ secrets.PYLON_KEY }}
          CLOSE_KEY:    ${{ secrets.CLOSE_KEY }}
          FATHOM_KEY:   ${{ secrets.FATHOM_KEY }}
          OPENAI_KEY:   ${{ secrets.OPENAI_KEY }}

      # Pass 1 generator — disabled until full system is ready for live launch
      # - name: Run Pass 1 generator (new accounts only)
      #   run: python pass1_generator.py
      #   env:
      #     SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
      #     OPENAI_KEY:     ${{ secrets.OPENAI_KEY }}
      #     RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
