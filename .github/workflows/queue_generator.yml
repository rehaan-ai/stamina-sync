name: Daily Ticket Queue

on:
  schedule:
    - cron: '30 5 * * 1-6'  # 05:30 UTC Mon–Sat = 11am IST (no Sundays)
  workflow_dispatch:         # manual trigger — useful for testing and re-runs

jobs:
  queue:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install weasyprint system dependencies
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      - name: Run queue generator
        run: python queue_generator.py
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          OPENAI_KEY:     ${{ secrets.OPENAI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_EMAIL:     ${{ secrets.TEST_EMAIL }}
