name: Report Generator

on:
  schedule:
    - cron: '30 3 * * 1'   # Monday 03:30 UTC = Monday 9am IST (weekly reports)
    - cron: '30 4 1 * *'   # 1st of month 04:30 UTC = 10am IST (monthly reports)
  workflow_dispatch:         # manual trigger — useful for testing and re-runs

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120     # up to 2 hours — parallelised but 42 external PDFs take time

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install weasyprint system dependencies
        run: sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      # Auto-detects weekly (Monday) vs monthly (1st of month) from the date.
      # If both are true (1st is a Monday), both weekly and monthly reports run.
      - name: Run report generator
        run: python report_generator.py
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          PYLON_KEY:      ${{ secrets.PYLON_KEY }}
          OPENAI_KEY:     ${{ secrets.OPENAI_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
